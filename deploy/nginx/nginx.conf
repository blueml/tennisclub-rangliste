# Reverse proxy in front of the FastAPI backend + built frontend.
#
# Terminates TLS, serves the built React app as static files, and forwards
# everything under /api to the backend container. Replace `test.comunicar.de`
# with your real domain before use.

# Plain HTTP: only used for the Let's Encrypt ACME challenge and to redirect
# everything else to HTTPS.
server {
    listen 80;
    server_name test.comunicar.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name test.comunicar.de;

    ssl_certificate     /etc/letsencrypt/live/test.comunicar.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.comunicar.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Built frontend (frontend/dist), mounted read-only into the container.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA fallback: any path that isn't a real static file is served
        # index.html so React Router can handle client-side routing.
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;

        # Forwarded headers so the backend knows the real client + scheme.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Session cookie relies on the browser sending it back on the same
        # origin — since nginx and the SPA share test.comunicar.de,
        # no cookie-domain rewriting is needed here.
    }
}
